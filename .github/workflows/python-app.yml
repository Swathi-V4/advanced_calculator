name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pandas python-dotenv

    - name: Run tests with coverage
      run: |
        pytest tests/test_operations.py tests/test_calculations.py tests/test_input_validators.py tests/test_history.py tests/test_calculator_memento.py tests/test_calculator_config.py tests/test_exceptions.py --cov=app --cov-fail-under=90